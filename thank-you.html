<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terima Kasih — GadaiBPKB</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFFFFF;
      --text: #1C1917;
      --text-dim: #57534E;
      --text-muted: #A8A29E;
      --yellow: #F5D508;
      --yellow-light: #FFE94A;
      --yellow-dark: #D4B800;
      --cyan: #ACDAE3;
      --success: #16A34A;
      --border: #E7E5E4;
      --font: 'Poppins', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .thank-you-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 4rem 3rem;
      text-align: center;
      max-width: 520px;
      width: 100%;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.7s cubic-bezier(0, 0, 0.2, 1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }

    .thank-you-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--yellow), var(--cyan));
    }

    .thank-you-card::after {
      content: '';
      position: absolute;
      top: -50%; right: -30%;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(245,213,8,0.06), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .success-icon {
      width: 80px; height: 80px;
      background: var(--success-light);
      border: 1px solid rgba(22,163,74,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 2rem;
      animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
      position: relative; z-index: 1;
    }

    .success-icon svg { color: var(--success); }

    h1 {
      font-family: var(--font);
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
      position: relative; z-index: 1;
    }

    .message {
      color: var(--text-dim);
      font-size: 1.05rem;
      line-height: 1.75;
      margin-bottom: 2.5rem;
      position: relative; z-index: 1;
    }

    .info-box {
      background: rgba(245,213,8,0.05);
      border: 1px solid rgba(245,213,8,0.15);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 2.5rem;
      text-align: left;
      position: relative; z-index: 1;
    }

    .info-box p { color: var(--text-dim); font-size: 0.9375rem; line-height: 1.7; }
    .info-box strong {
      display: block; margin-bottom: 0.375rem;
      color: var(--yellow-dark); font-size: 0.8125rem;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    .back-btn {
      display: inline-flex; align-items: center; gap: 0.625rem;
      padding: 1rem 2.25rem;
      background: linear-gradient(135deg, var(--yellow), var(--yellow-dark));
      color: var(--text);
      font-family: var(--font); font-size: 1rem; font-weight: 600;
      border: none; border-radius: 12px; cursor: pointer; text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 20px rgba(245,213,8,0.25);
      position: relative; z-index: 1;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(245,213,8,0.35);
    }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .thank-you-card { padding: 3rem 1.5rem; }
      h1 { font-size: 1.5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="thank-you-card">
    <div class="success-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>
    <h1>Terima Kasih!</h1>
    <p class="message">Pengajuan Anda telah berhasil dikirim. Tim kami akan menghubungi Anda dalam waktu 1×24 jam untuk proses verifikasi selanjutnya.</p>
    <div class="info-box">
      <p><strong>Yang perlu Anda siapkan:</strong></p>
      <p>KTP suami istri, KK, BPKB motor asli, STNK, dan bukti penghasilan.</p>
    </div>
    <a href="index.html" class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Kembali ke Beranda
    </a>
  </div>
</body>
</html>
